<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - El Pekinés</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --brand-aqua: #9ECED0;
            --brand-aqua-deep: #7FB4B6;
            --brand-gold: #C8A86A;
            --brand-ink: #1F3B3A;
            --brand-softwhite: #F7F5F2;
            --luxury-radius: 24px;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body.admin-body {
            background-color: var(--brand-softwhite);
            color: var(--brand-ink);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 25px; }

        /* --- LOGIN SCREEN (OVERLAY) --- */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #DEEFF0 0%, #F7F5F2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: var(--luxury-radius);
            box-shadow: 0 25px 60px rgba(158, 206, 208, 0.2);
            border: 1px solid rgba(200, 168, 106, 0.15);
            text-align: center;
        }

        .login-header img { height: 100px; margin-bottom: 25px; }
        .login-header h2 { font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 8px; }
        .login-header p { color: #6B7280; font-size: 0.95rem; margin-bottom: 35px; }

        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: var(--brand-gold);
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: #FAFAFA;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus { outline: none; border-color: var(--brand-aqua); box-shadow: 0 0 0 4px rgba(158, 206, 208, 0.1); }

        .btn-gold {
            background: var(--brand-aqua);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .btn-gold:hover:not(:disabled) { background: var(--brand-aqua-deep); transform: translateY(-2px); }
        .btn-gold:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- DASHBOARD --- */
        .admin-nav {
            background: white;
            padding: 15px 0;
            border-bottom: 1px solid rgba(200, 168, 106, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .admin-nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo-admin-small { display: flex; align-items: center; gap: 12px; font-family: var(--font-heading); font-weight: 600; text-decoration: none; color: inherit; }
        .logo-admin-small img { height: 48px; }

        .badge-connected {
            background: rgba(16, 185, 129, 0.08);
            color: #059669;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-logout {
            background: transparent;
            border: 1.5px solid #F3F4F6;
            color: #6B7280;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-logout:hover { border-color: #EF4444; color: #EF4444; }

        .admin-header-section { padding: 50px 0 30px; }
        .admin-header-section h1 { font-family: var(--font-heading); font-size: 2.22rem; margin-bottom: 8px; }

        .card-premium {
            background: white;
            border-radius: var(--luxury-radius);
            padding: 40px;
            box-shadow: 0 15px 45px rgba(31, 59, 58, 0.05);
            border: 1px solid rgba(200, 168, 106, 0.08);
            margin-bottom: 60px;
        }

        .card-title { font-family: var(--font-heading); font-size: 1.6rem; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .card-title i { color: var(--brand-gold); }

        .file-drop-zone {
            background: #F9FAFB;
            border: 2px dashed #E5E7EB;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            position: relative;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .file-drop-zone:hover { border-color: var(--brand-aqua); background: #F0F9F9; }

        .form-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px; }

        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .admin-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(200, 168, 106, 0.05);
            transition: transform 0.4s;
        }
        .admin-card:hover { transform: translateY(-8px); }

        .card-image { height: 220px; position: relative; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .badge-tag { position: absolute; top: 15px; right: 15px; padding: 6px 14px; border-radius: 50px; font-size: 0.72rem; font-weight: 700; color: white; text-transform: uppercase; }
        .tag-active { background: #10B981; }
        .tag-inactive { background: #9CA3AF; }

        .card-body { padding: 20px 25px; }
        .dog-name { display: block; font-family: var(--font-heading); font-size: 1.25rem; margin-bottom: 20px; }

        .action-row { display: flex; gap: 12px; }
        .btn-sm { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #F3F4F6; background: #F9FAFB; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem; font-weight: 600; transition: all 0.3s; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--brand-ink);
            color: white;
            padding: 16px 35px;
            border-radius: 50px;
            z-index: 10000;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }

        .skeleton { background: #eee; animation: skeleton-pulse 1.5s infinite; }
        @keyframes skeleton-pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 768px) { .container { padding: 0 20px; } .form-row { grid-template-columns: 1fr; } .login-card { padding: 40px 25px; } }
    </style>
    <!-- ImageKit SDK -->
    <script src="https://unpkg.com/imagekit-javascript/dist/imagekit.min.js"></script>
</head>
<body class="admin-body">

    <!-- OVERLAY: Premium Login -->
    <div id="loginOverlay">
        <div class="login-card">
            <div class="login-header">
                <img src="../Logo.png" alt="Logo El Pekinés">
                <h2>Panel Administrativo</h2>
                <p>Acceso privado para gestión de galería</p>
            </div>
            <!-- FORMULARIO REAL CON SUBMIT -->
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminPassInput">Contraseña de acceso</label>
                    <input type="password" id="adminPassInput" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-gold" id="btnLogin">
                    <span id="loginBtnText">Acceder al Panel</span>
                    <i class="fa-solid fa-spinner fa-spin hidden" id="loginLoader"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="adminContent" class="hidden">
        <nav class="admin-nav">
            <div class="container">
                <a href="/" class="logo-admin-small">
                    <img src="../Logo.png" alt="Logo">
                    <span>Gestión de Galería</span>
                </a>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="badge-connected">
                        <i class="fa-solid fa-circle-check"></i> ImageKit Conectado
                    </div>
                    <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </nav>

        <main class="container">
            <header class="admin-header-section">
                <h1>Administración de Imágenes</h1>
                <p>Gestiona las fotos de tus peluditos que aparecen en el Home.</p>
            </header>

            <!-- Card: Subida de Imágenes -->
            <section class="admin-upload-section">
                <div class="card-premium">
                    <h2 class="card-title"><i class="fa-solid fa-camera-retro"></i> Añadir nueva foto</h2>
                    <form id="uploadForm">
                        <div class="form-group">
                            <label>Seleccionar fotografía</label>
                            <div class="file-drop-zone" id="dropZone" onclick="document.getElementById('imageFile').click()">
                                <input type="file" id="imageFile" accept="image/*" required style="display: none">
                                <div id="dropZoneContent">
                                    <i class="fa-solid fa-image" style="font-size: 3rem; color: var(--brand-aqua); opacity: 0.5; margin-bottom: 15px;"></i>
                                    <p>Haz clic para buscar o arrastra una foto</p>
                                </div>
                                <div class="preview-container">
                                    <img id="imagePreview" class="hidden" style="max-width: 300px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="dogTitle">Nombre del perrito</label>
                                <input type="text" id="dogTitle" placeholder="Ej: Toby - Golden Retriever">
                            </div>
                            <div class="form-group">
                                <label for="displayOrder">Prioridad visual</label>
                                <input type="number" id="displayOrder" value="0">
                            </div>
                        </div>

                        <button type="submit" class="btn-gold" id="btnUpload">
                            <span id="btnText">Publicar en galería</span>
                            <i class="fa-solid fa-circle-notch fa-spin hidden" id="uploadLoader"></i>
                        </button>
                    </form>
                </div>
            </section>

            <!-- Section: Galería Actual -->
            <section>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 style="font-family: var(--font-heading); font-size: 1.8rem; margin: 0">Imágenes en Exposición</h2>
                    <div id="imageCount" style="font-size: 0.9rem; color: #6B7280;"></div>
                </div>

                <div id="galleryAdminGrid" class="admin-grid">
                    <div class="admin-card skeleton" style="height: 340px;"></div>
                    <div class="admin-card skeleton" style="height: 340px;"></div>
                    <div class="admin-card skeleton" style="height: 340px;"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification System -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toastMsg">Cambios aplicados</span>
    </div>

    <script src="admin.js"></script>
</body>
</html>
